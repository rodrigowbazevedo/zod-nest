name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    environment: packages
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          # Node 24.15.0 still ships npm 10.9.8, which lacks trusted-publisher
          # OIDC support. We upgrade to npm@11 explicitly via the @semantic-
          # release/exec publish step. Consumers can still use this package
          # on >=22 (engines); only the publish runner needs the newer npm.
          node-version: '24'
          # `registry-url` is mandatory for npm OIDC trusted publishing — it
          # writes a `.npmrc` that pins the registry, which is what triggers
          # the npm CLI to perform the OIDC handshake on `npm publish`.
          # Without it, npm falls through to "needs auth" and ENEEDAUTH.
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      # Run the full pipeline explicitly so each step is visible in the
      # release job's logs (and a failure points at the right step instead
      # of being hidden inside `npm publish`'s `prepublishOnly` chain).
      # CI runs the same steps on PRs; this is the source of truth at
      # release time.
      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Verbose npm logging surfaces the OIDC token exchange + any
          # trusted-publisher rejection details (otherwise hidden behind an
          # opaque 404 from `PUT /<package>`).
          NPM_CONFIG_LOGLEVEL: verbose
        run: npx semantic-release
