name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    environment: packages
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          # Node 24 bundles npm >= 11, required for OIDC trusted publishing.
          # Node 22 still ships npm 10.x as of mid-2026; consumers can still
          # use this package on >=22 (engines), only the publish runner needs
          # the newer npm.
          node-version: '24'
          # `registry-url` is mandatory for npm OIDC trusted publishing — it
          # writes a `.npmrc` that pins the registry, which is what triggers
          # the npm CLI to perform the OIDC handshake on `npm publish`.
          # Without it, npm falls through to "needs auth" and ENEEDAUTH.
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
