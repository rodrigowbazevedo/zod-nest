name: CI

# Only runs on pull requests. Push-to-main is handled by release.yml, which
# runs the same lint / typecheck / test / build steps as part of the release
# pipeline. Two workflows fighting over the same checks on main was wasteful.
on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Node 24 is the build/release Node (see release.yml). Node 22 client
    # compatibility is verified separately by the compat-matrix workflow,
    # which cross-products peer-dep cells with Node 22 + Node 24 and runs
    # pack-smoke under each. Keeping the standard PR gate to a single
    # Node version keeps the gate fast.
    name: Node 24
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:cov

      - run: npm run build

      # pack-smoke verifies the published tarball installs cleanly and every
      # documented public export resolves in both CJS and ESM — catches
      # publish-time-only regressions that the in-repo suite can't see
      # (missing files, broken `exports` map, ESM-resolution issues).
      - run: npm run pack:smoke

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: ./reports/junit.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
